services:
  db:
    image: mariadb:10.6
    container_name: ctfd-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - ctfd_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"${MYSQL_ROOT_PASSWORD}\""]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  cache:
    image: redis:7-alpine
    container_name: ctfd-cache
    restart: unless-stopped
    networks:
      - ctfd_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 3
      interval: 5s

  ctfd:
    build: .
    container_name: ctfd-app
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: db
      REDIS_URL: redis://cache:6379
      SECRET_KEY: ${SECRET_KEY}
      LOG_FOLDER: /var/log/CTFd
      UPLOAD_FOLDER: /var/uploads
      WORKERS: 1
      GUNICORN_CMD_ARGS: "--no-sendfile"
    volumes:
      - ./data/uploads:/var/uploads
      - /var/log/CTFd:/var/log/CTFd
      - ./plugins/ctfd-ldap-plugin:/opt/CTFd/CTFd/plugins/ctfd-ldap-plugin:ro
      - ./plugins/chat_notifier:/opt/CTFd/CTFd/plugins/chat_notifier:ro
      - ./plugins/ctfd-plugin-multichoice:/opt/CTFd/CTFd/plugins/ctfd-plugin-multichoice:ro
      - ./plugins/ctfd-user-control-plugin:/opt/CTFd/CTFd/plugins/ctfd-user-control-plugin:ro
      - ./themes/wmctf2025:/opt/CTFd/CTFd/themes/wmctf2025:ro
      - ./themes/pixo:/opt/CTFd/CTFd/themes/pixo:ro
      - ./themes/neon:/opt/CTFd/CTFd/themes/neon:ro
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ctfd_network
    expose:
      - "8000"
    entrypoint: ["/bin/sh", "/usr/local/bin/docker-entrypoint-wrapper.sh"]

  nginx:
    image: nginx:alpine
    container_name: ctfd-nginx
    ports:
      - "80:80"
    # - "443:443"  # uncomment after adding SSL certs to ./ssl/
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # - ./ssl:/etc/nginx/ssl:ro  # uncomment after adding SSL certs
    depends_on:
      - ctfd
    restart: unless-stopped
    networks:
      - ctfd_network

volumes:
  db_data:
  ctfd_data:

networks:
  ctfd_network:
    driver: bridge
